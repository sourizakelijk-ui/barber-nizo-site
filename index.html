    --bg-color: #ffffff; 
    --dark-bg: #0A0A0A;
    --text-color: #0A0A0A;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-cursive: 'Pinyon Script', cursive;
    --font-serif: 'Playfair Display', serif; 
    
    /* Carousel Layout Variables */
    --item-w: clamp(260px, 28vw, 360px);
    --gap: 2vw;
}

* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
}

html, body {
    /* Dark root so the iOS status-bar strip, home-indicator area and overscroll
       merge with the dark hero/booking. Every section sets its own background,
       so the white sections (gallery, footers) are unaffected. */
    background-color: var(--dark-bg);
    color: var(--text-color);
    overflow-x: hidden; 
    width: 100%; /* Changed from 100vw to 100% to prevent scrollbar overlap issues */
}

/* Hide scrollbar for Chrome, Safari and Opera */
::-webkit-scrollbar {
    display: none;
}

#master-wrapper { width: 100%; overflow: hidden; }

/* Intro & Hero Styles */
#intro-container { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100vh; 
    z-index: 9999; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    pointer-events: none; 
}

.intro-panel {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background-color: #000000;
    transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
    z-index: 1;
    pointer-events: auto; /* Block clicks on the panels */
}
.intro-panel.left { left: 0; transform-origin: left; }
.intro-panel.right { right: 0; transform-origin: right; }

#intro-container.split .intro-panel.left { transform: translateX(-100%); }
#intro-container.split .intro-panel.right { transform: translateX(100%); }

.aesthetic-word { 
    font-family: var(--font-serif); 
    font-style: italic; 
    font-weight: 400; 
    font-size: 8vw; 
    color: #ffffff; 
    opacity: 0; 
    clip-path: polygon(0 0, 0 0, 0 100%, 0% 100%); 
    transform: translateY(-20px); 
    z-index: 2;
    transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
}

#intro-container.split .aesthetic-word {
    opacity: 0 !important;
    transform: scale(1.15);
    filter: blur(0);
    animation: none;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.5s ease-out, transform 0.5s ease-out, visibility 0s linear 0.5s;
}

.write-word { animation: sweepText 1.0s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
@keyframes sweepText { 0% { opacity: 0; clip-path: polygon(0 0, 0 0, 0 100%, 0% 100%); transform: translateY(-20px); } 10% { opacity: 1; } 100% { opacity: 1; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transform: translateY(0); } }

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(calc(-50% - 12px)); }
}
.animate-scroll {
    animation: scroll 40s linear infinite;
}

#main-content {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 0; 
    position: relative; 
    background-color: var(--dark-bg);
    z-index: 1;
}

.hero-bg-image {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 60%, rgba(10,10,10,0.8) 85%, rgba(10,10,10,1) 100%), var(--hero-img);
    background-size: cover;
    background-position: center 10%;
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
    opacity: 0;
    z-index: -1;
    transition: opacity 1.5s ease-in-out;
}
.hero-bg-image.visible {
    opacity: 1;
}

nav { 
    position: absolute; 
    top: 2.5rem; 
    left: 50%; 
    background: transparent; 
    padding: 0.6rem 2rem; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    width: 100%; 
    max-width: 1200px; 
    opacity: 0; 
    transform: translate(-50%, -30px); 
    z-index: 50;
}
.nav-logo { font-family: var(--font-serif); font-size: 1.8rem; font-style: italic; font-weight: 400; color: #ffffff; }

.menu-container {
    position: relative;
}

.menu-trigger {
    background: none;
    border: none;
    color: #ffffff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
}

.menu-trigger:hover {
    opacity: 0.7;
}

.dropdown-menu {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 0.8rem;
    background: rgba(10, 10, 10, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    padding: 0.4rem 0;
    display: flex;
    flex-direction: column;
    min-width: 130px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.2s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.dropdown-menu a {
    color: #ffffff;
    text-decoration: none;
    padding: 0.6rem 1.2rem;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 0.85rem;
    transition: background-color 0.2s;
}

.dropdown-menu a:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

.hero { 
    flex-grow: 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between; 
    align-items: center; 
    text-align: center; 
    width: 100%;
    max-width: 1000px;
    z-index: 10;
    margin: 0 auto;
    padding: 7rem 1.5rem 3rem 1.5rem;
}
.hero-top-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 12vh; /* Adjusted for better vertical centering */
}
.hero-bottom-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: auto;
    width: 100%;
}
.sub-heading { font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 1.5rem; opacity: 0; transform: translateY(30px); color: #ffffff; text-align: center; }
.main-heading { font-family: var(--font-serif); font-size: clamp(1.5rem, 4vw, 3.2rem); line-height: 1.15; letter-spacing: -0.02em; font-weight: 400; opacity: 0; transform: translateY(120px) scale(0.5); color: #ffffff; margin-bottom: 2rem; margin-top: 0; text-align: center; text-shadow: 0 4px 30px rgba(0,0,0,1), 0 2px 10px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.6); }

.hero-divider {
    width: 60%;
    max-width: 300px;
    height: 1px;
    background-color: rgba(255, 255, 255, 0.8);
    margin: 0 auto 0.8rem auto;
    opacity: 0;
    transform: translateY(20px);
}
.hero-subtext {

/* Carousel & Fade Effects */
.carousel-wrapper {
    position: relative;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    overflow: hidden; /* Keeps the fades correctly positioned */
}

.carousel-scroll-area {
    overflow-x: auto;
    width: 100%;
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none; /* IE/Edge */
    cursor: grab;
}

.carousel-scroll-area:active {
    cursor: grabbing;
}

.carousel-scroll-area::-webkit-scrollbar {
    display: none;
}

/* Fading Edges */
.carousel-wrapper::before,
.carousel-wrapper::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 200px;
    z-index: 2;
    pointer-events: none;
}

.carousel-wrapper::before {
    left: 0;
    background: linear-gradient(to right, var(--dark-bg) 0%, rgba(10, 10, 10, 0) 100%);
}

.carousel-wrapper::after {
    right: 0;
    background: linear-gradient(to left, var(--dark-bg) 0%, rgba(10, 10, 10, 0) 100%);
}

/* Moving Track */
.carousel-track {
    display: flex;
    gap: 24px;
    width: max-content;
    animation: scroll 40s linear infinite;
}

/* Pauzeer animatie bij hover (vooral handig op desktop) */
.carousel-wrapper:hover .carousel-track {
    animation-play-state: paused;
}

/* Animatie Keyframes: Schuift exact 50% naar links + de helft van de gap (12px) */

/* =========================================
   APPOINTMENT OVERLAY STYLES

.appointment-overlay {

    z-index: 9999;

    pointer-events: none;

}

/* Hide scrollbar for appointment overlay */

    display: none;
}
.appointment-overlay {

    pointer-events: auto;
}

/* --- Popup Overlay --- */
.popup-overlay {
    position: fixed; /* Fixed so it covers the whole browser window */
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s;
    display: flex;
    align-items: center; 
    justify-content: center; 
    z-index: 99999; /* High z-index to stay on top of other website elements */
    font-family: 'Inter', sans-serif; /* Scoped font */
}

.popup-overlay.active {
    opacity: 1;
    visibility: visible;
}

/* --- Popup Content Box --- */
.popup-content {
    background: #1c1c1e;
    width: 88%; 
    max-width: 440px; 
    border-radius: 24px;
    padding: 32px 24px;
    box-sizing: border-box;
    color: #f5f5f7;
    transform: scale(0.95) translateY(10px);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.4s ease;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    max-height: 90vh; /* Ensure it fits on small vertical screens */

.popup-overlay.active .popup-content {

    opacity: 1;
}

const duplicatedReviews = [...reviews, ...reviews];

function Testimonials() {
    const scrollRef = useRef(null);
    const lastInteractionTime = useRef(0);
    const isProgrammaticScroll = useRef(false);
    const [isPaused, setIsPaused] = useState(false);
    const [isDragging, setIsDragging] = useState(false);
    const [startX, setStartX] = useState(0);
    const [scrollLeft, setScrollLeft] = useState(0);

    useEffect(() => {
        const scrollContainer = scrollRef.current;
        if (!scrollContainer) return;

        let animationFrameId;
        let exactScrollLeft = scrollContainer.scrollLeft;

        const scroll = () => {
            const timeSinceLastInteraction = Date.now() - lastInteractionTime.current;

            if (!isPaused && !isDragging && timeSinceLastInteraction > 500) {
                exactScrollLeft += 1.5;
                if (exactScrollLeft >= scrollContainer.scrollWidth / 2) {
                    exactScrollLeft = 0;
                }
                isProgrammaticScroll.current = true;
                scrollContainer.scrollLeft = exactScrollLeft;
            } else {
                exactScrollLeft = scrollContainer.scrollLeft;
            }
            animationFrameId = requestAnimationFrame(scroll);
        };

        animationFrameId = requestAnimationFrame(scroll);

        return () => cancelAnimationFrame(animationFrameId);
    }, [isPaused, isDragging]);

    const handleMouseDown = (e) => {
        setIsDragging(true);
        setStartX(e.pageX - scrollRef.current.offsetLeft);
        setScrollLeft(scrollRef.current.scrollLeft);
        lastInteractionTime.current = Date.now();
    };

    const handleMouseLeave = () => {
        setIsDragging(false);
        setIsPaused(false);
        lastInteractionTime.current = Date.now();
    };

    const handleMouseUp = () => {
        setIsDragging(false);
        lastInteractionTime.current = Date.now();
    };

    const handleMouseMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const x = e.pageX - scrollRef.current.offsetLeft;
        const walk = (x - startX) * 2;
        scrollRef.current.scrollLeft = scrollLeft - walk;
        lastInteractionTime.current = Date.now();
    };

    const handleTouchStart = () => {
        setIsPaused(true);
        lastInteractionTime.current = Date.now();
    };

    const handleTouchEnd = () => {
        setIsPaused(false);
        lastInteractionTime.current = Date.now();
    };

    const handleScroll = () => {
        if (isProgrammaticScroll.current) {
            isProgrammaticScroll.current = false;
            return;
        }
        if (!isDragging) {
            lastInteractionTime.current = Date.now();
        }
    };

    return (
        <>
            <div className="gradient-transition">
                <div className="scroll-indicator"></div>
            </div>
            <section className="testimonials-section" id="reviews">
                <div className="rating-badge">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2.05v7h7.5L9.5 22v-7H2.5l10.5-12.95z" />
                    </svg>
                    5.0 Sterren op Google
                </div>

                <h2 className="title">Ontmoet onze <br className="mobile-only-br" />tevreden klanten</h2>

                <p className="subtitle">Join de best geknipte mannen van Gent.</p>

                <div className="view-all-link" style={{ cursor: 'default', opacity: 0.8 }}>
                    Swipe door reviews
                    <span style={{ fontSize: '1.2rem', lineHeight: 1, marginLeft: '4px' }}>&rsaquo;</span>
                </div>

                <div className="carousel-wrapper">
                    <div
                        className="carousel-scroll-area"
                        ref={scrollRef}
                        onMouseLeave={handleMouseLeave}
                        onMouseDown={handleMouseDown}
                        onMouseUp={handleMouseUp}
                        onMouseMove={handleMouseMove}
                        onTouchStart={handleTouchStart}
                        onTouchEnd={handleTouchEnd}
                        onTouchCancel={handleTouchEnd}
                        onScroll={handleScroll}
                        style={{ userSelect: isDragging ? 'none' : 'auto' }}
                    >
                        <div className="carousel-track" style={{ animation: 'none' }}>
                            {duplicatedReviews.map((review, index) => (
                                <div key={index} className="card">
                                    <div className="card-header">
                                        <div className="user-info">
                                            <div className="avatar">{review.initials}</div>
                                            <div className="user-meta">
                                                <span className="user-name" title={review.name}>{review.name}</span>
                                                <span className="user-title">{review.title}</span>
                                            </div>
                                        </div>
                                        <div className="stars">★★★★★</div>
                                    </div>
                                    <p className="review-text">"{review.text}"</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </section>
        </>
    );
}

const textToScrub = "IT'S NOT A CUT, <br/> IT'S AN EXPERIENCE.";

function ThesisSection({ onOpenAppointment }) {
    const sectionRef = useRef(null);
    const [wordsToLightUp, setWordsToLightUp] = useState(0);
    const words = textToScrub.split(' ');

    useEffect(() => {

            if (sectionRef.current) {
                const rect = sectionRef.current.getBoundingClientRect();
                const windowHeight = window.innerHeight;
                const startPoint = windowHeight * 0.85;
                const scrollDistance = windowHeight * 0.6;

                let scrollProgress = rect.top <= startPoint ? (startPoint - rect.top) / scrollDistance : 0;
                scrollProgress = Math.max(0, Math.min(1, scrollProgress));
                setWordsToLightUp(Math.floor(scrollProgress * (words.length + 1)));
            }
        };

        window.addEventListener('scroll', handleScroll);
        handleScroll();
        return () => window.removeEventListener('scroll', handleScroll);
    }, [words.length]);

    return (
        <>
            <div className="gradient-transition">
                <div className="scroll-indicator"></div>

/* ========================= GallerySection ========================= */
function GallerySection({ onOpenAppointment }) {
    const trackRef = useRef(null);
    const [isVisible, setIsVisible] = useState(false);

    useEffect(() => {
        const observer = new IntersectionObserver(
            ([entry]) => {
                if (entry.isIntersecting) {
                    setIsVisible(true);
                }
            },
            { threshold: 0.2 }
        );

        if (trackRef.current) {
            observer.observe(trackRef.current);
        }

        return () => observer.disconnect();
    }, []);

    useEffect(() => {
        if (!isVisible) return;

        const track = trackRef.current;
        if (!track) return;

        const interval = setInterval(() => {
            const items = track.children;
            if (items.length !== 3) return;

            const itemWidth = items[0].getBoundingClientRect().width;
            const gap = parseFloat(window.getComputedStyle(track).gap) || window.innerWidth * 0.02;
            const slideDistance = itemWidth + gap;

            const firstItem = items[0];
            const clone = firstItem.cloneNode(true);
            clone.className = 'gallery-item hidden';
            track.appendChild(clone);

            void track.offsetWidth;

            items[0].className = 'gallery-item hidden-left';
            items[1].className = 'gallery-item prev';
            items[2].className = 'gallery-item active';
            items[3].className = 'gallery-item next';

            track.style.transition = "transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)";
            track.style.transform = `translateX(-${slideDistance}px)`;

            setTimeout(() => {
                track.style.transition = "none";
                firstItem.remove();
                track.style.transform = "translateX(0)";
            }, 800);
        }, 2000);

        return () => clearInterval(interval);
    }, [isVisible]);

    return (
        <div className="final-white-section">
            <div className="modern-gallery-container">
                <div className="gallery-viewport">
                    <div className="gallery-track" id="image-carousel" ref={trackRef}>
                        <div className="gallery-item prev">
                            <div className="img-inner" style={{ backgroundImage: "var(--hero-img)" }}></div>
                        </div>
                        <div className="gallery-item active">
                            <div className="img-inner" style={{ backgroundImage: `url('${IMG.g2}')` }}></div>
                        </div>
                        <div className="gallery-item next">
                            <div className="img-inner" style={{ backgroundImage: `url('${IMG.g3}')` }}></div>
                        </div>
                    </div>
                </div>

                <div className="gallery-text">
                    <h3 className="gallery-title">Check Beschikbaarheid!</h3>
                    <button onClick={onOpenAppointment} className="cta-btn" style={{ cursor: 'pointer', border: 'none' }}>Boek Nu! <span>↗</span></button>
                </div>
            </div>
        </div>
    );
}

    { id: "knippen", title: "Knippen", subtitle: "Klassiek & modern", price: "€25", icon: IMG.icScissors },
    { id: "knippen-en-baard-trimmen", title: "Knippen en baard trimmen", subtitle: "Complete verzorging", price: "€35", icon: IMG.icHairstyle },
    { id: "baard-trimmen", title: "Baard trimmen", subtitle: "Trimmen & contouren", price: "€15", icon: IMG.icHairstyle2 },
    { id: "huidverzorging", title: "Huidverzorging", subtitle: "Reiniging & verzorging", price: "€15", icon: IMG.icBeauty },
    { id: "bros-buzz-cut-baard", title: "Bros buzz cut & baard", subtitle: "Kort & strak", price: "€25", icon: "", lucideIcon: Scissors },
    { id: "kinderen-tot-10j", title: "Kinderen tot 10j", subtitle: "Knippen voor kinderen", price: "€20", icon: "", lucideIcon: Baby },
    { id: "knippen-wassen", title: "Knippen en wassen", subtitle: "Knippen & haar wassen", price: "€30", icon: "", lucideIcon: Droplets },
    { id: "meerdere-diensten", title: "Meerdere diensten", subtitle: "Combineer behandelingen", price: "", icon: "", lucideIcon: ListChecks }
];

function ServiceItem({ item, onClose, onSelect }) {
    const IconComponent = item.lucideIcon;

    const content = (
        <>
            <div className="title-row">
                <div className="title">{item.title}</div>
                {IconComponent ? (
                    <div className="icon-small lucide-wrapper">
                        <IconComponent size={24} strokeWidth={1.5} />
                    </div>
                ) : (
                    <div className="icon-small" style={{ maskImage: `url('${item.icon}')`, WebkitMaskImage: `url('${item.icon}')` }}></div>
                )}
            </div>
            <div className="subtitle">{item.subtitle}</div>
            {item.price && <div className={`price ${item.isAction || item.id ? 'nav-arrow' : ''}`}>{item.price}</div>}
        </>
    );

    if (item.id) {
        return (
            <button
                onClick={() => onSelect(item.id)}
                className="service-item"
            >
                {content}
            </button>
        );
    }

    if (item.isAction) {
        return (
            <button
                onClick={onClose}
                className="service-item"
            >
                {content}
            </button>
        );
    }

    return (
        <a
            href={item.url}
            target="_blank"
            rel="noreferrer"
            className="service-item"
        >
            {content}
        </a>
    );
}

function AppointmentPage({ isOpen, onClose }) {
    const [visible, setVisible] = useState(false);
    const [selectedService, setSelectedService] = useState(null);

    useEffect(() => {
        if (isOpen) {
            setVisible(true);
            window.scrollTo(0, 0);
            document.body.style.overflow = 'hidden';
            document.documentElement.style.overflow = 'hidden';
        } else {
            const timer = setTimeout(() => {
                setVisible(false);
                setSelectedService(null);
            }, 500);
            document.body.style.overflow = '';
            document.documentElement.style.overflow = '';
            return () => clearTimeout(timer);
        }
    }, [isOpen]);

    useEffect(() => {
        if (selectedService) {
            (function (C, A, L) {
                let p = function (a, ar) { a.q.push(ar); };
                let d = C.document;
                C.Cal = C.Cal || function () {
                    let cal = C.Cal;
                    let ar = arguments;
                    if (!cal.loaded) {
                        cal.ns = {};
                        cal.q = cal.q || [];
                        const s = d.createElement("script");
                        s.src = A;
                        d.head.appendChild(s);
                        cal.loaded = true;
                    }
                    if (ar[0] === L) {
                        const api = function () { p(api, arguments); };
                        const namespace = ar[1];
                        api.q = api.q || [];
                        if (typeof namespace === "string") {
                            cal.ns[namespace] = cal.ns[namespace] || api;
                            p(cal.ns[namespace], ar);
                            p(cal, ["initNamespace", namespace]);
                        } else p(cal, ar);
                        return;
                    }
                    p(cal, ar);
                };
            })(window, "https://app.cal.eu/embed/embed.js", "init");

            window.Cal("init", selectedService, { origin: "https://app.cal.eu" });

            window.Cal.ns[selectedService]("inline", {
                elementOrSelector: `#my-cal-inline-${selectedService}`,
                config: { "layout": "month_view", "useSlotsViewOnSmallScreen": "true", "theme": "dark" },
                calLink: `barbernizo/${selectedService}`,
            });

            window.Cal.ns[selectedService]("ui", { "theme": "dark", "hideEventTypeDetails": false, "layout": "month_view" });

            const container = document.getElementById(`my-cal-inline-${selectedService}`);
            if (container) {
                const hideIframeScrollbar = () => {
                    const iframe = container.querySelector('iframe');
                    if (iframe) {
                        iframe.setAttribute('scrolling', 'no');
                        iframe.style.overflow = 'hidden';
                    }
                };

                hideIframeScrollbar();

                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.addedNodes.length) {
                            hideIframeScrollbar();
                        }
                    });
                });
                observer.observe(container, { childList: true, subtree: true });
                return () => observer.disconnect();
            }
        }
    }, [selectedService]);

    if (!isOpen && !visible) return null;

    const handleBack = () => {
        if (selectedService) {
            setSelectedService(null);
        } else {
            onClose();
        }
    };

    return (
        <div className={`appointment-overlay ${isOpen ? 'open' : ''}`}>
            <div className={`app-container ${selectedService ? 'cal-active' : ''}`}>
                <div className="overlay-header">
                    <button onClick={handleBack} className="back-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        {selectedService ? 'Terug naar diensten' : 'Terug'}
                    </button>
                </div>

                {!selectedService && (
                    <div className="header">
                        <h1>MAAK HIER EEN AFSPRAAK</h1>
                    </div>
                )}

                {!selectedService ? (
                    <div className="service-list">
                        {services.map((service, index) => (
                            <ServiceItem
                                key={index}
                                item={service}
                                onClose={onClose}
                                onSelect={(id) => setSelectedService(id)}
                            />
                        ))}
                    </div>
                ) : (
                    <div className="cal-embed-container">
                        <div id={`my-cal-inline-${selectedService}`}></div>
                    </div>
                )}
            </div>
        </div>
    );
}

/* ========================= App ========================= */
function App() {
    const [isAppointmentOpen, setIsAppointmentOpen] = useState(false);

    const openAppointment = () => {
        window.scrollTo(0, 0);
        setIsAppointmentOpen(true);
    };

    useEffect(() => {
        const wordElement = document.getElementById('aesthetic-text');
        const introContainer = document.getElementById('intro-container');

        if (!wordElement || !introContainer) return;

        const t1 = setTimeout(() => {
            wordElement.classList.add('write-word');
        }, 500);

        const t2 = setTimeout(() => {
            introContainer.classList.add('split');
            triggerHeroAnimations();
        }, 1200);

        function triggerHeroAnimations() {
            document.getElementById('hero-bg-image')?.classList.add('visible');
            document.getElementById('hero-bg-bottom-fill')?.classList.add('visible');
            document.getElementById('sub-heading')?.classList.add('reveal-fade-up');
            document.getElementById('main-heading')?.classList.add('reveal-hero');

            setTimeout(() => {
                document.getElementById('nav-pill')?.classList.add('reveal-nav');
                document.getElementById('hero-divider')?.classList.add('reveal-fade-up');
                document.getElementById('hero-subtext')?.classList.add('reveal-fade-up');
                document.getElementById('hero-btn-wrapper')?.classList.add('reveal-fade-up');
            }, 300);
        }

        return () => {
            clearTimeout(t1);
            clearTimeout(t2);
        };
    }, []);

    return (
        <div id="master-wrapper">
            <Intro />
            <PolicyPopup />
            <MainContent onOpenAppointment={openAppointment} />
            <ThesisSection onOpenAppointment={openAppointment} />
            <GallerySection onOpenAppointment={openAppointment} />
            <FooterSection />
            <AppointmentPage isOpen={isAppointmentOpen} onClose={() => setIsAppointmentOpen(false)} />
        </div>
    );
}

createRoot(document.getElementById('root')).render(
    <StrictMode>
        <App />
    </StrictMode>
);
